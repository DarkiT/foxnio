# Security audit configuration
# https://github.com/rustsec/rustsec/blob/main/cargo-audit/audit.toml.example

# Ignore advisories that are not applicable to this project

# RUSTSEC-2024-0437: protobuf uncontrolled recursion
# Only affects parsing of untrusted protobuf input.
# We use protobuf through prometheus for metrics exposition only.

# RUSTSEC-2023-0071: rsa timing attack
# Comes from sqlx-mysql which we don't use (we use postgres only).

# RUSTSEC-2024-0363: sqlx binary protocol issue
# Requires upgrade to sqlx 0.8.x which is incompatible with sea-orm 0.12.

ignore = ["RUSTSEC-2024-0437", "RUSTSEC-2023-0071", "RUSTSEC-2024-0363"]

[yanked]
enabled = false
